<nav class="navbar navbar-expand-lg navbar-techstore">
  <div class="container">
    <!-- Brand -->
    <a class="navbar-brand" routerLink="/catalogo">
      🖥️ Tech<span>Store</span>
    </a>

    <!-- Toggler para mobile -->
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu"
            aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <!-- CLIENTE y ADMIN -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/catalogo" routerLinkActive="active">
            <i class="bi bi-grid me-1"></i> Catálogo
          </a>
        </li>

        <li class="nav-item" *ngIf="!esAdmin()">
          <a class="nav-link" routerLink="/mis-pedidos" routerLinkActive="active">
            <i class="bi bi-bag-check me-1"></i> Mis Pedidos
          </a>
        </li>

        <!-- Solo ADMIN -->
        <li class="nav-item" *ngIf="esAdmin()">
          <a class="nav-link" routerLink="/admin-productos" routerLinkActive="active">
            <i class="bi bi-gear me-1"></i> Gestión Productos
          </a>
        </li>

      </ul>

      <!-- Lado derecho -->
      <ul class="navbar-nav align-items-lg-center gap-2">

        <!-- Carrito (solo CLIENTE) -->
        <li class="nav-item" *ngIf="!esAdmin()">
          <a class="nav-link position-relative" routerLink="/carrito">
            <i class="bi bi-cart3 fs-5"></i>
            <span class="carrito-badge position-absolute top-0 start-100 translate-middle"
                  *ngIf="cantidadCarrito > 0">
              {{ cantidadCarrito }}
            </span>
          </a>
        </li>

        <!-- Usuario dropdown -->
        <li class="nav-item dropdown" *ngIf="usuario">
          <a class="nav-link dropdown-toggle" href="#" role="button"
             data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle me-1"></i>
            {{ usuario.nombre }}
            <span class="badge ms-1"
                  [class.bg-warning]="esAdmin()"
                  [class.bg-info]="!esAdmin()"
                  style="font-size:0.65rem">
              {{ usuario.rol }}
            </span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li>
              <a class="dropdown-item" routerLink="/perfil">
                <i class="bi bi-person me-2"></i> Mi Perfil
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button class="dropdown-item text-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
              </button>
            </li>
          </ul>
        </li>

      </ul>
    </div>
  </div>
</nav>
