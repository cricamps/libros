# ---------------------------------------------------------
# CONFIGURACIÓN GENERAL
# ---------------------------------------------------------
spring.application.name=full3
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api

# ---------------------------------------------------------
# CONEXIÓN A ORACLE EN LA NUBE
# Las credenciales se leen desde variables de entorno.
# Si no se definen, se usan los valores por defecto (solo para desarrollo local).
# En producción, definir las variables sin valores por defecto.
# ---------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@(description=(retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.sa-santiago-1.oraclecloud.com))(connect_data=(service_name=g1c6677be04d407_bibliotecadb_tp.adb.oraclecloud.com))(security=(ssl_server_dn_match=no)))}
spring.datasource.username=${DB_USERNAME:ADMIN}
spring.datasource.password=${DB_PASSWORD:Biblioteca2026X}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# ---------------------------------------------------------
# JPA / HIBERNATE
# ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Errores detallados en desarrollo
server.error.include-message=always
server.error.include-stacktrace=always
