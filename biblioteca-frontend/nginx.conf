# ============================================================
# nginx.conf - Configuración Nginx para Angular SPA
# DSY2205 - Semana 6 - Actividad Formativa 4
#
# Sirve la app Angular en el puerto 80.
# Redirige todas las rutas al index.html (necesario para
# que funcione el router de Angular en producción).
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirigir todas las rutas al index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tipos MIME correctos para archivos Angular
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
